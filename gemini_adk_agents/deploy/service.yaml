# Cloud Run Service Configuration
# Deploy with: gcloud run services replace service.yaml

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: gemini-adk-agents
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all
spec:
  template:
    metadata:
      annotations:
        # Autoscaling
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        # CPU always allocated (for faster cold starts)
        run.googleapis.com/cpu-throttling: "false"
        # Startup CPU boost
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: gemini-adk-agents@genai-treding.iam.gserviceaccount.com
      containers:
        - image: gcr.io/genai-treding/gemini-adk-agents:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            - name: GCP_PROJECT_ID
              value: "genai-treding"
            - name: GCP_LOCATION
              value: "us-central1"
            - name: ADK_MODEL
              value: "gemini-2.0-flash"
            - name: LOG_LEVEL
              value: "INFO"
          # Secrets from Secret Manager
          # env:
          #   - name: GOOGLE_API_KEY
          #     valueFrom:
          #       secretKeyRef:
          #         name: gemini-api-key
          #         key: latest
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
  traffic:
    - percent: 100
      latestRevision: true
